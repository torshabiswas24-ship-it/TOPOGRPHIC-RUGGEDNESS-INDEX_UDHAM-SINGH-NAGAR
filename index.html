<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/L.Control.Locate.min.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <link rel="stylesheet" href="css/leaflet-measure.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>TOPORAPHIC RUGGEDNESS INDEX_UDHAM-SING-NAGAR</title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/L.Control.Locate.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="data/USN_BOUNDARY_1.js"></script>
        <script src="data/USN_FEATURE_TO_POINT_2.js"></script>
        <script src="data/USN_GRID_3.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString' || e.target.feature.geometry.type === 'MultiLineString') {
              highlightLayer.setStyle({
                color: 'rgba(255, 255, 0, 1.00)',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: 'rgba(255, 255, 0, 1.00)',
                fillOpacity: 1
              });
            }
            highlightLayer.openPopup();
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[28.521820567254412,78.43791537221581],[29.58630975293203,80.4420093440912]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var title = new L.Control({'position':'topright'});
        title.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        title.update = function () {
            this._div.innerHTML = '<h2>TOPORAPHIC RUGGEDNESS INDEX_UDHAM-SING-NAGAR</h2>';
        };
        title.addTo(map);
        var abstract = new L.Control({'position':'bottomleft'});
        abstract.onAdd = function (map) {
            this._div = L.DomUtil.create('div',
            'leaflet-control abstract');
            this._div.id = 'abstract'
                this._div.setAttribute("onmouseenter", "abstract.show()");
                this._div.setAttribute("onmouseleave", "abstract.hide()");
                this.hide();
                return this._div;
            };
            abstract.hide = function () {
                this._div.classList.remove("abstractUncollapsed");
                this._div.classList.add("abstract");
                this._div.innerHTML = 'i'
            }
            abstract.show = function () {
                this._div.classList.remove("abstract");
                this._div.classList.add("abstractUncollapsed");
                this._div.innerHTML = 'The Topographic Ruggedness Index (TRI) map of Udham Singh Nagar was generated using DEM data to evaluate terrain roughness and elevation variability. The analysis highlights spatial differences in surface ruggedness, identifying areas of low, moderate, and high terrain complexity. This study provides valuable insights for geomorphological assessment, land-use planning, and environmental management.';
        };
        abstract.addTo(map);
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
            map.setMaxBounds(map.getBounds());
            map.setMinZoom(map.getZoom());
        }
        map.createPane('pane_OSMStandard_0');
        map.getPane('pane_OSMStandard_0').style.zIndex = 400;
        var layer_OSMStandard_0 = L.tileLayer('http://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OSMStandard_0',
            opacity: 1.0,
            attribution: '<a href="https://www.openstreetmap.org/copyright">© OpenStreetMap contributors, CC-BY-SA</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OSMStandard_0;
        map.addLayer(layer_OSMStandard_0);
        function pop_USN_BOUNDARY_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_USN_BOUNDARY_1_0() {
            return {
                pane: 'pane_USN_BOUNDARY_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 4.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(231,113,72,0.0)',
                interactive: true,
            }
        }
        map.createPane('pane_USN_BOUNDARY_1');
        map.getPane('pane_USN_BOUNDARY_1').style.zIndex = 401;
        map.getPane('pane_USN_BOUNDARY_1').style['mix-blend-mode'] = 'normal';
        var layer_USN_BOUNDARY_1 = new L.geoJson(json_USN_BOUNDARY_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_USN_BOUNDARY_1',
            layerName: 'layer_USN_BOUNDARY_1',
            pane: 'pane_USN_BOUNDARY_1',
            onEachFeature: pop_USN_BOUNDARY_1,
            style: style_USN_BOUNDARY_1_0,
        });
        bounds_group.addLayer(layer_USN_BOUNDARY_1);
        map.addLayer(layer_USN_BOUNDARY_1);
        function pop_USN_FEATURE_TO_POINT_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_USN_FEATURE_TO_POINT_2_0() {
            return {
                pane: 'pane_USN_FEATURE_TO_POINT_2',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(53,221,19,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_USN_FEATURE_TO_POINT_2');
        map.getPane('pane_USN_FEATURE_TO_POINT_2').style.zIndex = 402;
        map.getPane('pane_USN_FEATURE_TO_POINT_2').style['mix-blend-mode'] = 'normal';
        var layer_USN_FEATURE_TO_POINT_2 = new L.geoJson(json_USN_FEATURE_TO_POINT_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_USN_FEATURE_TO_POINT_2',
            layerName: 'layer_USN_FEATURE_TO_POINT_2',
            pane: 'pane_USN_FEATURE_TO_POINT_2',
            onEachFeature: pop_USN_FEATURE_TO_POINT_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_USN_FEATURE_TO_POINT_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_USN_FEATURE_TO_POINT_2);
        map.addLayer(layer_USN_FEATURE_TO_POINT_2);
        function pop_USN_GRID_3(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Id</th>\
                        <td>' + (feature.properties['Id'] !== null ? autolinker.link(String(feature.properties['Id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">MEAN</th>\
                        <td>' + (feature.properties['MEAN'] !== null ? autolinker.link(String(feature.properties['MEAN']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_USN_GRID_3_0() {
            return {
                pane: 'pane_USN_GRID_3',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 3.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(243,166,178,0.0)',
                interactive: true,
            }
        }
        map.createPane('pane_USN_GRID_3');
        map.getPane('pane_USN_GRID_3').style.zIndex = 403;
        map.getPane('pane_USN_GRID_3').style['mix-blend-mode'] = 'normal';
        var layer_USN_GRID_3 = new L.geoJson(json_USN_GRID_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_USN_GRID_3',
            layerName: 'layer_USN_GRID_3',
            pane: 'pane_USN_GRID_3',
            onEachFeature: pop_USN_GRID_3,
            style: style_USN_GRID_3_0,
        });
        bounds_group.addLayer(layer_USN_GRID_3);
        map.addLayer(layer_USN_GRID_3);
        map.createPane('pane_TOPOGRAPHIC_RUGGEDNESS_INDEX_4');
        map.getPane('pane_TOPOGRAPHIC_RUGGEDNESS_INDEX_4').style.zIndex = 404;
        var img_TOPOGRAPHIC_RUGGEDNESS_INDEX_4 = 'data/TOPOGRAPHIC_RUGGEDNESS_INDEX_4.png';
        var img_bounds_TOPOGRAPHIC_RUGGEDNESS_INDEX_4 = [[28.64753272911815,78.70885646899768],[29.460475351119232,80.18633118451466]];
        var layer_TOPOGRAPHIC_RUGGEDNESS_INDEX_4 = new L.imageOverlay(img_TOPOGRAPHIC_RUGGEDNESS_INDEX_4,
                                              img_bounds_TOPOGRAPHIC_RUGGEDNESS_INDEX_4,
                                              {pane: 'pane_TOPOGRAPHIC_RUGGEDNESS_INDEX_4'});
        bounds_group.addLayer(layer_TOPOGRAPHIC_RUGGEDNESS_INDEX_4);
        map.addLayer(layer_TOPOGRAPHIC_RUGGEDNESS_INDEX_4);
        var overlaysTree = [
            {label: "TOPOGRAPHIC_RUGGEDNESS_INDEX", layer: layer_TOPOGRAPHIC_RUGGEDNESS_INDEX_4},
            {label: '<img src="legend/USN_GRID_3.png" /> USN_GRID', layer: layer_USN_GRID_3},
            {label: '<img src="legend/USN_FEATURE_TO_POINT_2.png" /> USN_FEATURE_TO_POINT', layer: layer_USN_FEATURE_TO_POINT_2},
            {label: '<img src="legend/USN_BOUNDARY_1.png" /> USN_BOUNDARY', layer: layer_USN_BOUNDARY_1},
            {label: "OSM Standard", layer: layer_OSMStandard_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        L.ImageOverlay.include({
            getBounds: function () {
                return this._bounds;
            }
        });
        </script>        
    </body>
</html>
